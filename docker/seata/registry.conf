# ========================================================
# Seata Server 1.8 — 注册/配置中心（Docker 容器内使用）
# 容器内通过 nacos:8848 访问 Nacos
# ========================================================

registry {
  type = "nacos"

  nacos {
    application = "seata-server"
    serverAddr = "nacos:8848"
    group = "SEATA_GROUP"
    namespace = "public"
    cluster = "default"
  }
}

config {
  type = "nacos"

  nacos {
    serverAddr = "nacos:8848"
    group = "SEATA_GROUP"
    namespace = "public"
    dataId = "seataServer.properties"
  }
}
