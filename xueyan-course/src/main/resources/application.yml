# ========================================================
# xueyan-course 课程服务 — 应用配置
# ========================================================
server:
  port: ${COURSE_SERVER_PORT:8102}

spring:
  config:
    import: optional:nacos:xueyan-course.yaml
  cache:
    type: none
  cloud:
    nacos:
      discovery:
        enabled: true
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${DB_HOST:127.0.0.1}:${DB_PORT:3306}/xueyan_course?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: ${DB_USER:root}
    password: ${DB_PASS:123456}
    type: com.alibaba.druid.pool.DruidDataSource
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20

  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASS:}

# Seata 分布式事务（课程服务参与下单全局事务）
seata:
  enabled: false
  registry:
    type: nacos
    nacos:
      server-addr: ${NACOS_HOST:127.0.0.1}:${NACOS_PORT:8848}
      namespace: ${NACOS_NAMESPACE:public}
      group: SEATA_GROUP
      application: seata-server
  config:
    type: nacos
    nacos:
      server-addr: ${NACOS_HOST:127.0.0.1}:${NACOS_PORT:8848}
      namespace: ${NACOS_NAMESPACE:public}
      group: SEATA_GROUP
  service:
    vgroup-mapping:
      xueyan-tx-group: default
    disable-global-transaction: false

mybatis-plus:
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

knife4j:
  enable: true
  setting:
    language: zh_cn

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
