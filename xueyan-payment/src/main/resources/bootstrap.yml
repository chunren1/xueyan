# ========================================================
# xueyan-payment 支付服务 — Nacos 引导配置
# ========================================================
spring:
  application:
    name: xueyan-payment
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_HOST:127.0.0.1}:${NACOS_PORT:8848}
        namespace: ${NACOS_NAMESPACE:}
      config:
        server-addr: ${NACOS_HOST:127.0.0.1}:${NACOS_PORT:8848}
        namespace: ${NACOS_NAMESPACE:}
        file-extension: yaml
        shared-configs:
          - data-id: xueyan-common.yaml
            refresh: true
